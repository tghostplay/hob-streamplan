<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HandOfMemes – Streamplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#15131f; --bg-2:#1d1930; --card:#221d3a; --card-edge:#322a52;
    --ink:#ECEAF5; --muted:#9b97b8; --accent:#FF8A5B; --accent-2:#8b86f0; --live:#4ade80;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:
      radial-gradient(1100px 600px at 80% -10%,#2a2350 0%,transparent 60%),
      radial-gradient(900px 500px at -10% 10%,#241d3f 0%,transparent 55%),
      var(--bg);
    color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:56px 22px 90px}
  header{margin-bottom:40px}
  .kicker{
    font-family:"JetBrains Mono",monospace;font-size:12px;
    letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);display:flex;align-items:center;gap:9px;
  }
  .live-dot{
    width:8px;height:8px;border-radius:50%;background:var(--live);
    animation:pulse 2.4s infinite;
  }
  @keyframes pulse{
    0%  {box-shadow:0 0 0 0 rgba(74,222,128,.55)}
    70% {box-shadow:0 0 0 10px rgba(74,222,128,0)}
    100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}
  }
  h1{
    font-family:"Bricolage Grotesque",sans-serif;font-weight:800;
    font-size:clamp(34px,7vw,56px);line-height:1.02;letter-spacing:-.02em;
    margin:14px 0 8px;
    background:linear-gradient(100deg,var(--ink) 30%,var(--accent) 130%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .subtitle{color:var(--muted);font-size:15px;margin:0}
  .updated{
    font-family:"JetBrains Mono",monospace;font-size:12px;
    color:var(--muted);margin-top:18px;
  }
  .updated b{color:var(--accent-2);font-weight:500}

  /* Cards */
  .card{
    background:linear-gradient(180deg,var(--card) 0%,var(--bg-2) 100%);
    border:1px solid var(--card-edge);border-radius:18px;
    padding:26px 26px 22px;margin-bottom:22px;
    position:relative;overflow:hidden;
  }
  .card--first{border-color:rgba(255,138,91,.45)}
  .card--first::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
    background:linear-gradient(var(--accent),var(--accent-2));
  }
  .card-eyebrow{
    font-family:"JetBrains Mono",monospace;font-size:12px;
    color:var(--muted);display:flex;align-items:center;
    gap:8px;flex-wrap:wrap;margin-bottom:12px;
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .sep{opacity:.4}
  .badge{
    margin-left:auto;background:rgba(255,138,91,.16);color:var(--accent);
    border:1px solid rgba(255,138,91,.4);padding:1px 9px;border-radius:99px;
    font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  }
  .card-title{
    font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:clamp(20px,3.4vw,26px);line-height:1.2;
    letter-spacing:-.01em;margin:0 0 10px;
  }
  .flair{
    display:inline-block;margin:0 0 14px;padding:2px 11px;
    background:#2a2347;border:1px solid var(--card-edge);border-radius:99px;
    font-family:"JetBrains Mono",monospace;font-size:11px;
    letter-spacing:.04em;color:var(--accent-2);
  }
  .card-body{color:#d7d3ea;font-size:15.5px}
  .card-body p{margin:0 0 12px}
  .card-body a{color:var(--accent);text-underline-offset:2px}
  .card-body ul,.card-body ol{margin:0 0 12px;padding-left:20px}
  .card-body li{margin:3px 0}
  .card-body table{border-collapse:collapse;width:100%;margin:0 0 12px;font-size:14px}
  .card-body th,.card-body td{border:1px solid var(--card-edge);padding:7px 10px;text-align:left}
  .card-body th{background:#2a2347}
  .post-img{
    display:block;max-width:100%;height:auto;border-radius:12px;
    margin:0 0 14px;border:1px solid var(--card-edge);
  }
  .card-link{
    display:inline-block;margin-top:14px;color:var(--accent-2);
    font-size:13px;font-weight:600;text-decoration:none;
  }
  .card-link:hover{color:var(--accent)}

  /* States */
  .state{
    text-align:center;padding:60px 20px;color:var(--muted);
    border:1px dashed var(--card-edge);border-radius:18px;
  }
  .spinner{
    width:36px;height:36px;border:3px solid var(--card-edge);
    border-top-color:var(--accent-2);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{
    margin-top:40px;padding-top:22px;border-top:1px solid var(--card-edge);
    color:var(--muted);font-size:13px;text-align:center;
  }
  footer a{color:var(--accent-2)}
  @media(prefers-reduced-motion:reduce){.live-dot,.spinner{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker"><span class="live-dot"></span>Stream-Plan</div>
    <h1>HandOfMemes – Streamplan</h1>
    <p class="subtitle">Automatisch aus r/HandOfMemes übernommen</p>
    <p class="updated" id="ts">Wird geladen…</p>
  </header>
  <main id="feed">
    <div class="state"><div class="spinner"></div>Lade Beiträge…</div>
  </main>
  <footer>
    Quelle: <a href="https://reddit.com/r/HandOfMemes" target="_blank" rel="noopener">r/HandOfMemes</a>
    · <a href="javascript:location.reload()">Neu laden</a>
  </footer>
</div>

<script>
// ── Konfiguration ──────────────────────────────────────────────────────────
const SUBREDDIT   = "HandOfMemes";
const FLAIR       = "streamplan";    // Flair-Filter (Kleinschreibung); "" = alle
const MAX_POSTS   = 5;
// ──────────────────────────────────────────────────────────────────────────

const RSS_URL = `https://www.reddit.com/r/${SUBREDDIT}/new.rss?limit=30`;
// corsproxy.io leitet die Anfrage vom Browser an Reddit weiter,
// umgeht so die CORS-Beschränkung ohne jede Authentifizierung.
const PROXY   = "https://corsproxy.io/?";

function age(isoStr) {
  const s = (Date.now() - new Date(isoStr).getTime()) / 1000 | 0;
  if (s < 3600)  return `vor ${Math.max(1, s/60|0)} Min.`;
  if (s < 86400) return `vor ${s/3600|0} Std.`;
  return `vor ${s/86400|0} Tg.`;
}
function dateFmt(isoStr) {
  return new Date(isoStr).toLocaleDateString("de-DE",
    {day:"2-digit", month:"2-digit", year:"numeric"});
}
function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;");
}
function extractImages(html) {
  const imgs = [];
  // i.redd.it Bilder aus img[src] oder a[href]
  for (const m of html.matchAll(/src="(https:\/\/[^"]*i\.redd\.it[^"]*)"/g)) imgs.push(m[1]);
  for (const m of html.matchAll(/href="(https:\/\/i\.redd\.it\/[^"]+\.(?:jpg|jpeg|png|gif|webp))"/g)) imgs.push(m[1]);
  return [...new Set(imgs)];
}
function cleanBody(html) {
  // "submitted by"-Zeile und Tabelle (Reddit-Footer) entfernen
  return html
    .replace(/<table[\s\S]*?<\/table>/gi, "")
    .replace(/submitted by[\s\S]*/i, "")
    .trim();
}

function renderCard(entry, first) {
  const title    = entry.querySelector("title")?.textContent?.trim() ?? "";
  const link     = entry.querySelector("link")?.getAttribute("href") ?? "";
  const author   = (entry.querySelector("author name")?.textContent ?? "").replace(/^\/?(u\/)?/,"");
  const pub      = entry.querySelector("published")?.textContent ?? "";
  const cats     = [...entry.querySelectorAll("category")].map(c => c.getAttribute("term") ?? "");
  const content  = entry.querySelector("content")?.textContent ?? "";

  const flair = cats.find(c => c.toLowerCase().includes(FLAIR)) ?? cats[0] ?? "";

  const imgTags = extractImages(content)
    .map(u => `<img class="post-img" src="${esc(u)}" alt="" loading="lazy">`)
    .join("");

  const body = cleanBody(content);
  const bodyHtml = (imgTags || body)
    ? `<div class="card-body">${imgTags}${body}</div>` : "";

  return `
    <article class="card${first ? " card--first" : ""}">
      <div class="card-eyebrow">
        <span class="dot"></span>${dateFmt(pub)}
        <span class="sep">/</span>${age(pub)}
        <span class="sep">/</span>u/${esc(author)}
        ${first ? '<span class="badge">neu</span>' : ""}
      </div>
      <h2 class="card-title">${esc(title)}</h2>
      ${flair ? `<span class="flair">${esc(flair)}</span>` : ""}
      ${bodyHtml}
      <a class="card-link" href="${esc(link)}" target="_blank" rel="noopener">Auf Reddit ansehen →</a>
    </article>`;
}

async function load() {
  const feed = document.getElementById("feed");
  const ts   = document.getElementById("ts");
  try {
    const res  = await fetch(PROXY + encodeURIComponent(RSS_URL));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const xml  = new DOMParser().parseFromString(text, "application/xml");
    const err  = xml.querySelector("parsererror");
    if (err) throw new Error("RSS-Parsing fehlgeschlagen");

    let entries = [...xml.querySelectorAll("entry")];

    // Flair-Filter
    if (FLAIR) {
      const f = FLAIR.toLowerCase();
      const filtered = entries.filter(e =>
        [...e.querySelectorAll("category")]
          .some(c => (c.getAttribute("term") ?? "").toLowerCase().includes(f))
      );
      if (filtered.length) entries = filtered;
    }

    entries = entries.slice(0, MAX_POSTS);

    if (!entries.length) {
      feed.innerHTML = '<div class="state">Keine passenden Beiträge gefunden.</div>';
    } else {
      feed.innerHTML = entries.map((e, i) => renderCard(e, i === 0)).join("");
    }

    const now = new Date().toLocaleString("de-DE",
      {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    ts.innerHTML = `Zuletzt aktualisiert: <b>${now} Uhr</b>`;

  } catch(e) {
    feed.innerHTML = `<div class="state">
      Fehler beim Laden: ${esc(e.message)}<br><br>
      <a href="javascript:location.reload()" style="color:var(--accent-2)">Erneut versuchen</a>
    </div>`;
    ts.textContent = "Laden fehlgeschlagen";
    console.error(e);
  }
}

load();
</script>
</body>
</html>
